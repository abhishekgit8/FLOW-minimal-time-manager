<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0a0a0a"/>
  <!-- Outer ring (clock) -->
  <circle cx="64" cy="56" r="34" fill="none" stroke="#333" stroke-width="4"/>
  <!-- Progress arc (golden) -->
  <path d="M 64 22 A 34 34 0 1 1 34 78" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="64" y1="56" x2="64" y2="34" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="80" y2="50" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="64" cy="56" r="4" fill="#f59e0b"/>
  <!-- Bottom bar (time track) -->
  <rect x="32" y="100" width="64" height="4" rx="2" fill="#333"/>
  <rect x="32" y="100" width="40" height="4" rx="2" fill="url(#g)"/>
</svg>
